<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="https://pages-themes.github.io/cayman/assets/css/style.css?v=">
  <!-- MathJax for LaTeX math rendering -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    /* Extra styles for the study guide */
    .page-header { padding: 1.5rem 2rem; }
    .main-content { max-width: 52rem; }
    .main-content h1 { margin-top: 2rem; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    .main-content h2 { margin-top: 1.5rem; }
    .main-content table { font-size: 0.85em; }
    .main-content pre { font-size: 0.8em; }
    nav.chapter-nav { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 1em; margin: 1.5em 0; }
    nav.chapter-nav ul { list-style: none; padding: 0; margin: 0; columns: 2; }
    nav.chapter-nav li { margin: 0.3em 0; }
    nav.chapter-nav a { text-decoration: none; }
    .nav-links { display: flex; justify-content: space-between; margin: 2em 0; padding: 1em 0; border-top: 1px solid #eee; }
    .nav-links a { text-decoration: none; font-weight: 600; }
    @media (max-width: 600px) { nav.chapter-nav ul { columns: 1; } }
  </style>
</head>
<body>
  <header class="page-header" role="banner">
    <h1 class="project-name"><a href="{{ '/' | relative_url }}" style="color:white;text-decoration:none;">{{ site.title }}</a></h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
  </header>
  <main id="content" class="main-content" role="main">
    {{ content }}
    <footer class="site-footer">
      <span class="site-footer-credits">
        &copy; Ed (Ehsan) Shah Hosseini &mdash;
        <a href="{{ '/' | relative_url }}">Table of Contents</a>
      </span>
    </footer>
  </main>
</body>
</html>
